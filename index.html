  <script>
    (() => {
      const STATES=Object.freeze(["IDLE","SCANNING","FOUND","RESULT"]);
      const FOUND_DURATION=1300;
      const element=document.querySelector(".headphone");
      let currentState="IDLE";
      let foundTimer;

      function createSvg(templateId,className){
        const svg=document.getElementById(templateId).content.querySelector("svg").cloneNode(true);
        svg.classList.add(...className.split(/\s+/));
        svg.setAttribute("aria-hidden","true");
        svg.setAttribute("focusable","false");
        return svg;
      }

      element.append(
        createSvg("headphone-gray-template","headphone__base"),
        createSvg("headphone-white-template","headphone__full"),
        createSvg("headphone-white-template","headphone__pulse headphone__pulse--glow"),
        createSvg("headphone-white-template","headphone__pulse headphone__pulse--core")
      );

      function normalizeState(state){return String(state||"").trim().toUpperCase()}

      function notify(state){
        const detail={state};
        window.dispatchEvent(new CustomEvent("headphone:statechange",{detail}));
        if(window.parent!==window) window.parent.postMessage({type:"HEADPHONE_STATE_CHANGED",...detail},"*");
      }

      function setState(nextState){
        const state=normalizeState(nextState);
        if(!STATES.includes(state)) throw new Error(`Unknown headphone state: ${nextState}`);
        window.clearTimeout(foundTimer);
        if(state==="FOUND"){
          element.dataset.state="IDLE";
          void element.offsetWidth;
        }
        element.dataset.state=state;
        currentState=state;
        notify(state);
        if(state==="FOUND"){
          foundTimer=window.setTimeout(()=>{if(currentState==="FOUND") setState("RESULT")},FOUND_DURATION);
        }
      }

      window.headphone=Object.freeze({setState,getState:()=>currentState,states:STATES});

      window.addEventListener("message",(event)=>{
        const data=event.data;
        if(!data||typeof data!=="object") return;
        if(data.type==="SET_HEADPHONE_STATE"||data.type==="HEADPHONE_SET_STATE") setState(data.state);
      });
    })();
    window.FOUND = () => setState("FOUND");
window.SCAN = () => setState("SCANNING");
window.RESULT = () => setState("RESULT");
window.IDLE = () => setState("IDLE");
  </script>
